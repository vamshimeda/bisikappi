<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4px base grid — generous, unhurried rhythm" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-card);padding:22px;font-family:var(--font-sans)}
  .r{display:flex;align-items:center;gap:14px;margin-bottom:9px}
  .bar{height:16px;background:var(--bk-terracotta-300);border-radius:3px}
  .t{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);width:130px}
</style></head><body>
<div class="r"><span class="t">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
<div class="r"><span class="t">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
<div class="r"><span class="t">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
<div class="r"><span class="t">--space-8 · 32</span><div class="bar" style="width:32px"></div></div>
<div class="r"><span class="t">--space-12 · 48</span><div class="bar" style="width:48px"></div></div>
<div class="r"><span class="t">--space-16 · 64</span><div class="bar" style="width:64px"></div></div>
<div class="r"><span class="t">--space-24 · 96</span><div class="bar" style="width:96px"></div></div>
</body></html>
