<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bk-paper);padding:26px;font-family:var(--font-sans);display:flex;align-items:center;gap:24px}
  .mark{width:104px;height:104px;flex-shrink:0}
  .word{font-family:var(--font-display);font-weight:600;font-size:54px;line-height:0.95;color:var(--text-primary);letter-spacing:-0.01em}
  .kan{font-family:var(--font-script);font-weight:600;font-size:24px;color:var(--text-accent);margin-top:2px}
  .tag{font-family:var(--font-sans);font-size:var(--text-sm);color:var(--text-secondary);margin-top:8px;letter-spacing:0.01em}
  .ov{font-family:var(--font-sans);font-size:var(--text-2xs);font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-brand);margin-bottom:6px}
</style></head><body>
  <img class="mark" src="../assets/logo/bisi-kaapi-mark.png" alt="Bisi Kaapi" />
  <div>
    <div class="ov">Estd. with love</div>
    <div class="word">Bisi Kaapi</div>
    <div class="kan">ಬಿಸಿ ಕಾಫಿ</div>
    <div class="tag">Because everybody loves "Bisi" (hot) + "Kaapi" (coffee).</div>
  </div>
</body></html>
