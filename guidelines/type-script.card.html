<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-dark);padding:24px;display:flex;align-items:center;gap:26px}
  .kan{font-family:var(--font-script);font-weight:600;font-size:54px;color:var(--bk-brass-300);line-height:1}

<div><div class="kan">ಬಿಸಿ ಕಾಫಿ</div></div>
<div>
  <div class="en">Bisi Kaapi</div>
  <div class="sub">"Bisi" (hot) + "Kaapi" (coffee)</div>
  <div class="meta">Anek Kannada · 400–700 · accent only, never body</div>
</div>
</body></html>
