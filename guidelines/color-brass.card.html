<!-- @dsCard group="Colors" viewport="700x172" name="Accent — Brass Gold" subtitle="Heritage brass: dividers, highlights, the bean motif" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px; font-family: var(--font-sans); }
  .ramp { display: flex; gap: 10px; }
  .col { flex: 1; min-width: 0; }
  .sw { height: 76px; border-radius: var(--radius-md); border: 1px solid rgba(43,26,18,0.06); }
  .nm { font-size: var(--text-2xs); font-weight: 600; color: var(--text-primary); margin-top: 8px; white-space: nowrap; }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); }
</style></head><body>
<div class="ramp">
  <div class="col"><div class="sw" style="background:var(--bk-brass-700)"></div><div class="nm">brass-700</div><div class="hex">#8A6322</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-brass-600)"></div><div class="nm">brass-600 · hover</div><div class="hex">#A67E33</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-brass-500);box-shadow:var(--shadow-sm)"></div><div class="nm">brass-500 · accent</div><div class="hex">#C49A48</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-brass-400)"></div><div class="nm">brass-400</div><div class="hex">#D7B468</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-brass-300)"></div><div class="nm">brass-300</div><div class="hex">#E6CF98</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-brass-100)"></div><div class="nm">brass-100 · soft</div><div class="hex">#F4E8C9</div></div>
</div>
</body></html>
