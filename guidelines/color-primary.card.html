<!-- @dsCard group="Colors" viewport="700x172" name="Primary — Roasted Caramel" subtitle="Coffee Chakra: Roasted Cherry → Caramel, the core action color" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px; font-family: var(--font-sans); }
  .ramp { display: flex; gap: 10px; }
  .col { flex: 1; }
  .sw { height: 76px; border-radius: var(--radius-md); border: 1px solid rgba(43,26,18,0.06); }
  .nm { font-size: var(--text-2xs); font-weight: 600; color: var(--text-primary); margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); }
</style></head><body>
<div class="ramp">
  <div class="col"><div class="sw" style="background:var(--bk-terracotta-700)"></div><div class="nm">700 · roasted cherry</div><div class="hex">#6E2615</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-terracotta-600)"></div><div class="nm">600 · hover</div><div class="hex">#8A3A20</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-terracotta-500);box-shadow:var(--shadow-sm)"></div><div class="nm">500 · primary</div><div class="hex">#A8481F</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-terracotta-400)"></div><div class="nm">400</div><div class="hex">#C7703A</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-terracotta-300)"></div><div class="nm">300</div><div class="hex">#DD9A6A</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-terracotta-100)"></div><div class="nm">100 · soft</div><div class="hex">#F4DEC9</div></div>
</div>
</body></html>
