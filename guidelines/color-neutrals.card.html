<!-- @dsCard group="Colors" viewport="700x172" name="Warm Neutrals" subtitle="Brown-tinted greys — never cold. Text, borders, fills" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px; font-family: var(--font-sans); }
  .ramp { display: flex; gap: 10px; }
  .col { flex: 1; min-width: 0; }
  .sw { height: 76px; border-radius: var(--radius-md); border: 1px solid rgba(43,26,18,0.06); }
  .nm { font-size: var(--text-2xs); font-weight: 600; color: var(--text-primary); margin-top: 8px; white-space: nowrap; }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); }
</style></head><body>
<div class="ramp">
  <div class="col"><div class="sw" style="background:var(--bk-warm-900)"></div><div class="nm">warm-900</div><div class="hex">#2B1A12</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-warm-700)"></div><div class="nm">warm-700 · text 2°</div><div class="hex">#5A4636</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-warm-500)"></div><div class="nm">warm-500 · muted</div><div class="hex">#8B7560</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-warm-300)"></div><div class="nm">warm-300 · border</div><div class="hex">#C7B7A4</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-warm-200)"></div><div class="nm">warm-200</div><div class="hex">#E0D3C0</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-warm-100)"></div><div class="nm">warm-100</div><div class="hex">#EFE6D6</div></div>
</div>
</body></html>
