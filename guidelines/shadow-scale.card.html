<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation" subtitle="Warm espresso-tinted shadows, never neutral grey" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-sunken);padding:28px 22px;font-family:var(--font-sans)}
  .row{display:flex;gap:24px;flex-wrap:wrap}
  .col{text-align:center}
  .box{width:96px;height:64px;background:var(--surface-card);border-radius:var(--radius-md)}
  .nm{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);margin-top:12px}
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="nm">shadow-xs</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="nm">shadow-sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="nm">shadow-md</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="nm">shadow-lg</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="nm">shadow-xl</div></div>
</div>
</body></html>
