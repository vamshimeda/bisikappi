<!-- @dsCard group="Spacing" viewport="700x176" name="Corner Radii" subtitle="Soft, hand-warmed rounding — like a cup's lip" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-card);padding:22px;font-family:var(--font-sans)}
  .row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
  .col{text-align:center}
  .box{width:84px;height:64px;background:var(--bk-brass-100);border:1.5px solid var(--bk-brass-500)}
  .nm{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);margin-top:8px}
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="nm">xs · 4</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="nm">sm · 8</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="nm">md · 12</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="nm">lg · 18</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="nm">xl · 28</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="nm">pill</div></div>
</div>
</body></html>
