<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>

  .arch{height:268px;border-radius:8px}

  <img class="arch" src="../assets/illustrations/story-arch.png" alt="Story arch illustration" />
  <div class="t">
    <div class="ov">The heart of the brand</div>
    <h3 class="h">A cup that holds a whole place.</h3>
    <p class="p">Filter dripper, sleeping cat, caparisoned elephant, gopuram and stone chariot, coffee blossom — one continuous monoline weaving South India into the steam.</p>
