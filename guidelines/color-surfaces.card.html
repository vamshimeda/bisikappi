<!-- @dsCard group="Colors" viewport="700x172" name="Surfaces & Full-bleed" subtitle="Page, card, and the three brand full-bleed sections" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px; font-family: var(--font-sans); }
  .ramp { display: flex; gap: 10px; }
  .col { flex: 1; min-width: 0; }
  .sw { height: 76px; border-radius: var(--radius-md); border: 1px solid rgba(43,26,18,0.06); }
  .nm { font-size: var(--text-2xs); font-weight: 600; color: var(--text-primary); margin-top: 8px; white-space: nowrap; }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); }
</style></head><body>
<div class="ramp">
  <div class="col"><div class="sw" style="background:var(--bk-paper);border:1px solid var(--border-default)"></div><div class="nm">paper · page</div><div class="hex">#FAEFDB</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-cream);border:1px solid var(--border-default)"></div><div class="nm">cream · sunken</div><div class="hex">#F2E4CC</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-milk);border:1px solid var(--border-default)"></div><div class="nm">milk · card</div><div class="hex">#FFFCF6</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-bark)"></div><div class="nm">bark · dark</div><div class="hex">#441607</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-marigold)"></div><div class="nm">marigold</div><div class="hex">#FA8A24</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-maroon)"></div><div class="nm">maroon</div><div class="hex">#7A2E2A</div></div>
</div>
</body></html>
