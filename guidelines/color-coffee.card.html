<!-- @dsCard group="Colors" viewport="700x172" name="Coffee & Roast Browns" subtitle="The ink and deep surfaces — sampled from brand creatives" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px; font-family: var(--font-sans); }
  .ramp { display: flex; gap: 10px; }
  .col { flex: 1; min-width: 0; }
  .sw { height: 76px; border-radius: var(--radius-md); border: 1px solid rgba(43,26,18,0.06); }
  .nm { font-size: var(--text-2xs); font-weight: 600; color: var(--text-primary); margin-top: 8px; white-space: nowrap; }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); }
</style></head><body>
<div class="ramp">
  <div class="col"><div class="sw" style="background:var(--bk-espresso)"></div><div class="nm">espresso · ink</div><div class="hex">#2B1A12</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-bark)"></div><div class="nm">bark · dark bg</div><div class="hex">#441607</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-coffee-800)"></div><div class="nm">coffee-800</div><div class="hex">#46291A</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-coffee-700)"></div><div class="nm">coffee-700 · roast</div><div class="hex">#5A3A28</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-coffee-600)"></div><div class="nm">coffee-600</div><div class="hex">#6E4A33</div></div>
  <div class="col"><div class="sw" style="background:var(--bk-latte)"></div><div class="nm">latte</div><div class="hex">#D8B891</div></div>
</div>
</body></html>
