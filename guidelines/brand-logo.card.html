<!-- @dsCard group="Brand" viewport="700x190" name="Logo Mark — Colorways" subtitle="The swirling-steam medallion in its four approved fills" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-card);padding:18px;font-family:var(--font-sans);display:flex;gap:14px}
  .tile{flex:1;border-radius:var(--radius-lg);height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:1px solid var(--border-subtle)}
  .tile img{width:78px;height:78px}
  .cap{font-family:var(--font-mono);font-size:var(--text-2xs)}
</style></head><body>
  <div class="tile" style="background:var(--bk-paper)"><img src="../assets/logo/bisi-kaapi-mark.png" alt="mark" /><span class="cap" style="color:var(--text-muted)">ink / on cream</span></div>
  <div class="tile" style="background:var(--bk-bark)"><img src="../assets/logo/bisi-kaapi-mark-cream.png" alt="mark cream" /><span class="cap" style="color:rgba(255,247,238,0.7)">cream / on bark</span></div>
  <div class="tile" style="background:var(--bk-paper)"><img src="../assets/logo/bisi-kaapi-mark-brass.png" alt="mark brass" /><span class="cap" style="color:var(--text-muted)">brass / accent</span></div>
  <div class="tile" style="background:var(--bk-paper)"><img src="../assets/logo/bisi-kaapi-mark-terracotta.png" alt="mark terracotta" /><span class="cap" style="color:var(--text-muted)">terracotta</span></div>
</body></html>
