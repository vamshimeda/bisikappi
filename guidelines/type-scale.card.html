<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Display & UI sizes with their tokens" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-card);padding:22px}
  .r{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--border-subtle)}
  .s{color:var(--text-primary);font-family:var(--font-display);font-weight:600;line-height:1.1;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .t{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);white-space:nowrap}
</style></head><body>
<div class="r"><span class="s" style="font-size:48px">Display lg</span><span class="t">--text-display-lg · 44–64</span></div>
<div class="r"><span class="s" style="font-size:36px">Display md</span><span class="t">--text-display-md · 36–48</span></div>
<div class="r"><span class="s" style="font-size:28px">Heading 3xl</span><span class="t">--text-3xl · 28</span></div>
<div class="r"><span class="s" style="font-size:20px">Heading xl</span><span class="t">--text-xl · 20</span></div>
<div class="r"><span class="s" style="font-size:16px;font-family:var(--font-sans);font-weight:400">Body / base</span><span class="t">--text-md · 16</span></div>
<div class="r" style="border:none"><span class="s" style="font-size:12px;font-family:var(--font-sans);font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-accent)">Overline label</span><span class="t">--text-xs · caps</span></div>
</body></html>
