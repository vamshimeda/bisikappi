<!-- @dsCard group="Components" viewport="700x540" name="Forms & Inputs" subtitle="Button · IconButton · Input · Select · Checkbox · Radio · Switch · Stepper" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forms & Inputs</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); padding: 22px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 18px 28px; }
  .lbl { font-family: var(--font-sans); font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-accent); margin-bottom: 9px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Input, Textarea, Select, Checkbox, Radio, Switch, QuantityStepper } = window.BisiKaapiDesignSystem_2fbe5e;
  const Ic = ({ d }) => <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d={d} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  const plus = "M12 5v14M5 12h14", heart = "M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z", search = "M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.3-4.3";
  function Demo() {
    const [qty, setQty] = React.useState(2);
    return (
      <div className="grid">
        <div style={{ gridColumn: '1 / -1' }}>
          <div className="lbl">Button — variants</div>
          <div className="row">
            <Button variant="primary">Add to cart</Button>
            <Button variant="accent">Reserve table</Button>
            <Button variant="secondary">Browse beans</Button>
            <Button variant="ghost">Cancel</Button>
            <Button variant="danger">Remove</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
          <div className="row" style={{ marginTop: 12 }}>
            <Button size="sm" leadingIcon={<Ic d={plus} />}>Small</Button>
            <Button size="md" leadingIcon={<Ic d={plus} />}>Medium</Button>
            <Button size="lg" leadingIcon={<Ic d={plus} />}>Large</Button>
          </div>
        </div>
        <div>
          <div className="lbl">Icon Button</div>
          <div className="row">
            <IconButton label="Add" variant="solid"><Ic d={plus} /></IconButton>
            <IconButton label="Fav" variant="soft"><Ic d={heart} /></IconButton>
            <IconButton label="Search" variant="outline"><Ic d={search} /></IconButton>
            <IconButton label="More" variant="ghost"><Ic d={heart} /></IconButton>
          </div>
        </div>
        <div>
          <div className="lbl">Quantity Stepper</div>
          <QuantityStepper value={qty} onChange={setQty} />
        </div>
        <div>
          <div className="lbl">Input</div>
          <Input placeholder="Search the menu" leadingIcon={<Ic d={search} />} />
        </div>
        <div>
          <div className="lbl">Select</div>
          <Select defaultValue="m">
            <option value="s">Small</option><option value="m">Medium</option><option value="l">Large</option>
          </Select>
        </div>
        <div>
          <div className="lbl">Checkbox / Radio</div>
          <div className="row" style={{ gap: 20 }}>
            <Checkbox label="Add jaggery" defaultChecked />
            <Radio direction="row" defaultValue="hot" options={[{value:'hot',label:'Hot'},{value:'iced',label:'Iced'}]} />
          </div>
        </div>
        <div>
          <div className="lbl">Switch</div>
          <Switch label="Notify me about new roasts" defaultChecked />
        </div>
        <div style={{ gridColumn: '1 / -1' }}>
          <div className="lbl">Textarea</div>
          <Textarea rows={2} placeholder="Any notes for the barista?" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
