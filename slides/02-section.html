<!-- @dsCard group="Slides" viewport="1280x720" name="Section Divider" subtitle="Numbered chapter break on marigold" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;height:100%}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#1c0e05}
  #slide{width:1280px;height:720px;flex-shrink:0;box-sizing:border-box;position:relative;overflow:hidden;background:var(--bk-marigold);display:flex;flex-direction:column;justify-content:center;padding:0 96px;}
  .ov{font-family:var(--font-sans);font-size:15px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase}
  .disp{font-family:var(--font-display);font-weight:600;letter-spacing:-0.02em;margin:0;line-height:1.02}
  .body{font-family:var(--font-sans);line-height:1.6}
  .mono{font-family:var(--font-mono)}
  .kan{font-family:var(--font-script);font-weight:600}
  
</style></head><body>
<div id="stage"><div id="slide">

  <div class="mono" style="font-size:30px;color:rgba(56,20,8,0.55);font-weight:600">01</div>
  <div class="disp" style="font-size:88px;color:var(--bk-bark);margin-top:8px">Our Story</div>
  <p class="body" style="font-size:22px;color:rgba(56,20,8,0.82);margin-top:18px;max-width:40ch">Decades in the making. But the new beginning.</p>
  <img src="../assets/illustrations/coffee-branch-color.png" alt="" style="position:absolute;right:-30px;bottom:-30px;height:62%;opacity:0.5" />
</div></div>
<script>function fit(){var s=Math.min(innerWidth/1280,innerHeight/720);document.getElementById('slide').style.transform='scale('+s+')'}addEventListener('resize',fit);fit();</script>
</body></html>
