<!-- @dsCard group="Slides" viewport="1280x720" name="Title Slide" subtitle="Brand cover — logo, wordmark, tagline" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;height:100%}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#1c0e05}
  #slide{width:1280px;height:720px;flex-shrink:0;box-sizing:border-box;position:relative;overflow:hidden;background:radial-gradient(120% 90% at 80% 10%, rgba(196,154,72,0.12), transparent 55%), var(--bk-bark);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px;}
  .ov{font-family:var(--font-sans);font-size:15px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase}
  .disp{font-family:var(--font-display);font-weight:600;letter-spacing:-0.02em;margin:0;line-height:1.02}
  .body{font-family:var(--font-sans);line-height:1.6}
  .mono{font-family:var(--font-mono)}
  .kan{font-family:var(--font-script);font-weight:600}
  
</style></head><body>
<div id="stage"><div id="slide">

  <img src="../assets/logo/bisi-kaapi-mark-cream.png" alt="" style="width:128px;height:128px;margin-bottom:30px" />
  <div class="disp" style="font-size:92px;color:var(--bk-paper);white-space:nowrap">Bisi Kaapi</div>
  <div class="kan" style="font-size:34px;color:var(--bk-brass-300);margin-top:6px">ಬಿಸಿ ಕಾಫಿ</div>
  <p class="body" style="font-size:21px;color:rgba(255,247,238,0.78);margin-top:22px;max-width:46ch">Because everybody loves "Bisi" (hot) + "Kaapi" (coffee).</p>
  <div class="ov" style="color:var(--bk-brass-300);position:absolute;bottom:48px;left:0;right:0">Brand Deck · 2026</div>
</div></div>
<script>function fit(){var s=Math.min(innerWidth/1280,innerHeight/720);document.getElementById('slide').style.transform='scale('+s+')'}addEventListener('resize',fit);fit();</script>
</body></html>
