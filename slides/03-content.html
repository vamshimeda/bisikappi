<!-- @dsCard group="Slides" viewport="1280x720" name="Content Slide" subtitle="Heading, body & bullets with side illustration" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;height:100%}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#1c0e05}
  #slide{width:1280px;height:720px;flex-shrink:0;box-sizing:border-box;position:relative;overflow:hidden;background:var(--bk-paper);display:grid;grid-template-columns:1.15fr 0.85fr;}
  .ov{font-family:var(--font-sans);font-size:15px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase}
  .disp{font-family:var(--font-display);font-weight:600;letter-spacing:-0.02em;margin:0;line-height:1.02}
  .body{font-family:var(--font-sans);line-height:1.6}
  .mono{font-family:var(--font-mono)}
  .kan{font-family:var(--font-script);font-weight:600}
  .li{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}.dot{width:11px;height:11px;border-radius:50%;background:var(--color-primary);margin-top:7px;flex-shrink:0}
</style></head><body>
<div id="stage"><div id="slide">

  <div style="padding:84px 64px;display:flex;flex-direction:column;justify-content:center">
    <div class="ov" style="color:var(--text-brand)">What we believe</div>
    <h2 class="disp" style="font-size:52px;color:var(--text-primary);margin-top:14px">More than a drink — an experience</h2>
    <div style="margin-top:34px">
      <div class="li"><span class="dot"></span><span class="body" style="font-size:19px;color:var(--text-secondary)"><b style="color:var(--text-primary)">Authentic flavours.</b> Estate beans from the Western Ghats, roasted in small batches.</span></div>
      <div class="li"><span class="dot"></span><span class="body" style="font-size:19px;color:var(--text-secondary)"><b style="color:var(--text-primary)">Meaningful moments.</b> A café, fresh foods, and our own range — under one roof.</span></div>
      <div class="li"><span class="dot"></span><span class="body" style="font-size:19px;color:var(--text-secondary)"><b style="color:var(--text-primary)">The joy of slowing down.</b> Served the traditional way, in a steel davara tumbler.</span></div>
    </div>
  </div>
  <div style="background:var(--bk-bark);display:flex;align-items:center;justify-content:center"><img src="../assets/illustrations/story-arch.png" alt="" style="height:480px" /></div>
</div></div>
<script>function fit(){var s=Math.min(innerWidth/1280,innerHeight/720);document.getElementById('slide').style.transform='scale('+s+')'}addEventListener('resize',fit);fit();</script>
</body></html>
